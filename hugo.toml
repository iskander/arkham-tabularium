baseURL = "https://iskander.github.io/arkham-tabularium/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

title = "Arkham Tabularium"

[params]
  author = "Iskander"
  goatcounter = "arkhamt"   # ← your GoatCounter site code (e.g. "arkhamt" for arkhamt.goatcounter.com)

[taxonomies]
  tag = "tags"
  cycle = "cycles"
  difficulty = "difficulty"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# ── LANGUAGES ────────────────────────────────────────────────────────────────
#
# Menus are generated dynamically from sections that have published articles —
# see layouts/partials/header.html. No hardcoded menu entries here.

[languages]

  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    title = "Arkham Tabularium"
    [languages.en.params]
      description = "Writing on Arkham Horror: The Card Game, the Arkham Horror RPG, Call of Cthulhu, and adjacent mythos gaming."
      tagline = "An archive of investigations, obsessions, and eldritch encounters"

  [languages.fr]
    languageName = "Français"
    languageCode = "fr-be"
    weight = 2
    title = "Arkham Tabularium"
    [languages.fr.params]
      description = "Écrits sur Arkham Horror : Le Jeu de Cartes, le JdR Arkham Horror, L'Appel de Cthulhu et le jeu mythos apparenté."
      tagline = "Une archive d'investigations, d'obsessions et de rencontres eldritches"

  [languages.pt]
    languageName = "Português"
    languageCode = "pt-pt"
    weight = 3
    title = "Arkham Tabularium"
    [languages.pt.params]
      description = "Escritos sobre Arkham Horror: O Jogo de Cartas, o RPG Arkham Horror, Chamado de Cthulhu e jogos mythos relacionados."
      tagline = "Um arquivo de investigações, obsessões e encontros eldritch"

  [languages.nl]
    languageName = "Nederlands"
    languageCode = "nl-be"
    weight = 4
    title = "Arkham Tabularium"
    [languages.nl.params]
      description = "Geschreven over Arkham Horror: Het Kaartspel, het Arkham Horror rollenspel, Call of Cthulhu en aanverwante mythos-spellen."
      tagline = "Een archief van onderzoeken, obsessies en eldritch ontmoetingen"
