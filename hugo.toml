baseURL = "https://iskander.github.io/arkham-tabularium/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false   # English at root /, French at /fr/, etc.

title = "Arkham Tabularium"

[params]
  author = "Iskander"
  goatcounter = "arkhamt"   # ← your GoatCounter site code (e.g. "arkhamt" for arkhamt.goatcounter.com)

[taxonomies]
  tag = "tags"
  cycle = "cycles"
  difficulty = "difficulty"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# ── LANGUAGES ────────────────────────────────────────────────────────────────

[languages]

  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    title = "Arkham Tabularium"
    [languages.en.params]
      description = "Scenario reviews, deck guides, campaign logs, and investigator analyses for Arkham Horror: The Card Game."
      tagline = "An archive of investigations, obsessions, and eldritch encounters"

    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "Scenarios"
        url = "/scenarios/"
        weight = 10
      [[languages.en.menu.main]]
        name = "Investigators"
        url = "/investigators/"
        weight = 20
      [[languages.en.menu.main]]
        name = "Deck Guides"
        url = "/decks/"
        weight = 30
      [[languages.en.menu.main]]
        name = "Campaigns"
        url = "/campaigns/"
        weight = 40
      [[languages.en.menu.main]]
        name = "Articles"
        url = "/articles/"
        weight = 50

  [languages.fr]
    languageName = "Français"
    languageCode = "fr-be"
