{{ define "main" }}

<section class="hero">
  <p class="hero-eyebrow">Arkham Horror: The Card Game</p>
  <h1 class="hero-title">{{ .Site.Title }}</h1>
  <div class="hero-rule"></div>
  <p class="hero-tagline">{{ .Site.Params.tagline }}</p>
</section>

<div class="container">

  {{ $recent := where .Site.RegularPages "Draft" false | first 9 }}

  {{ if $recent }}
  <div style="padding-bottom: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border);">
    <p class="section-label">{{ i18n "latest_dispatches" }}</p>
  </div>
  <div class="cards-grid">
    {{ range $recent }}
      {{ partial "card.html" . }}
    {{ end }}
  </div>
  {{ end }}

</div>

{{ end }}
